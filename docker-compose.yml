version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile.backend
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      NETWORK: "${NETWORK:-mainnet}"
      API_KEY: "${API_KEY}"
    restart: unless-stopped
