services:
  gateway:
    image: kammerlo/phoenix-explorer-gateway:${IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: packages/gateway/Dockerfile.gateway
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      NETWORK: "${NETWORK:-mainnet}"
      API_KEY: "${API_KEY}"
    restart: unless-stopped

  frontend:
    image: kammerlo/phoenix-explorer:${IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile.frontend
      args:
        REACT_APP_API_URL: /api
        REACT_APP_NETWORK: "${NETWORK:-mainnet}"
        REACT_APP_API_TYPE: GATEWAY
    ports:
      - "80:80"
    depends_on:
      - gateway
    restart: unless-stopped
