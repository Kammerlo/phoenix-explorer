name: Release Docker images

on:
  release:
    types: [published]

# Don't let a re-run of the same release overlap itself. Distinct releases
# get distinct groups (keyed by tag), so they never serialize against each other.
concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag is semver
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          if ! printf '%s' "$TAG" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::Release tag '$TAG' is not valid semver (expected e.g. v1.2.3 or 1.2.3). Aborting release."
            exit 1
          fi
          echo "Release tag '$TAG' is valid semver."

  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: kammerlo/phoenix-explorer
            dockerfile: packages/frontend/Dockerfile.frontend
          - image: kammerlo/phoenix-explorer-gateway
            dockerfile: packages/gateway/Dockerfile.gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          # We control `latest` explicitly below, so disable the action's auto-latest.
          flavor: |
            latest=false
          # Exact version (leading `v` stripped) + `latest` only for non-prereleases.
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
